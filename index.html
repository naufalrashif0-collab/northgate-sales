  const diff = new Date(d+" 23:59:59") - new Date();
  if(diff<=0) return "Berakhir";
  const dv=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), m=Math.floor((diff%3600000)/60000);
  if(dv>0) return `${dv}h ${h}j lagi`;
  if(h>0)  return `${h}j ${m}m lagi`;
  return `${m}m lagi`;
};

// ── AVATAR UPLOAD ─────────────────────────────────────────────────────────────
const AvatarUpload = ({user,onSave,onBack,loading}) => {
  const [preview,setPreview] = useState(user.avatar||null);
  const rank = getRank(user.lbp||0);
  const handleFile = e => {
    const file = e.target.files[0]; if(!file) return;
    if(!file.type.startsWith("image/")){alert("File harus gambar!"); return;}
    if(file.size>3*1024*1024){alert("Maks 3MB!"); return;}
    const r = new FileReader();
    r.onload = ev => setPreview(ev.target.result);
    r.readAsDataURL(file);
  };
  return (
    <div style={{minHeight:"100vh",background:"#07070f",fontFamily:ff,color:"#e0e0e0",paddingBottom:32,maxWidth:480,margin:"0 auto"}}>
      <BackHeader title="Edit Foto Profil" sub="Profil" accent="#9333ea" onBack={onBack}/>
      <div style={{padding:"24px 16px"}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:32}}>
          <div style={{position:"relative",marginBottom:16}}>
            {preview
              ?<img src={preview} style={{width:120,height:120,borderRadius:"50%",objectFit:"cover",border:`3px solid ${rank.color}`,display:"block"}}/>
              :<div style={{width:120,height:120,borderRadius:"50%",background:`linear-gradient(135deg,${rank.color},#1a0533)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:48,fontWeight:800,border:`3px solid ${rank.color}55`,color:"#fff"}}>
                {user.username[0].toUpperCase()}
              </div>
            }
            <label htmlFor="avInput" style={{position:"absolute",bottom:4,right:4,background:"#9333ea",borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14}}>📷</label>
          </div>
          <div style={{fontSize:18,fontWeight:800}}>{user.username}</div>
          <Badge c={rank.color}>{rank.label}</Badge>
        </div>
        <input id="avInput" type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
        <Card style={{marginBottom:16,textAlign:"center"}}>
          <div style={{fontSize:13,color:"#666",marginBottom:14}}>Tap ikon 📷 atau tombol di bawah</div>
          <label htmlFor="avInput">
            <div style={{background:"rgba(147,51,234,0.1)",border:"1px solid rgba(147,51,234,0.3)",borderRadius:14,padding:14,fontSize:15,fontWeight:700,color:"#c084fc",cursor:"pointer",marginBottom:preview&&preview!==user.avatar?12:0}}>
              📷 Pilih Foto dari Galeri
            </div>
          </label>
          {preview&&preview!==user.avatar&&<Btn onClick={()=>onSave(preview)} loading={loading} style={{marginTop:8}}>✓ Simpan Foto</Btn>}
          {preview&&<div style={{marginTop:10}}><Btn variant="danger" small onClick={()=>{setPreview(null);onSave(null);}} loading={loading}>🗑 Hapus Foto</Btn></div>}
        </Card>
        <div style={{fontSize:11,color:"#444",textAlign:"center"}}>Foto maks 3MB · JPG, PNG, GIF</div>
      </div>
    </div>
  );
};

// ── CHAT COMPONENT ────────────────────────────────────────────────────────────
const ChatView = ({currentUser,targetName,targetAvatar,targetLbp,threadUid,isAdmin,onBack}) => {
  const [msgs,setMsgs]   = useState([]);
  const [msg,setMsg]     = useState("");
  const [sending,setSending] = useState(false);
  const bottomRef        = useRef(null);

  useEffect(()=>{
    const unsub = cRef(threadUid).orderBy("ts","asc").onSnapshot(snap=>{
      const list = snap.docs.map(d=>({id:d.id,...d.data()}));
      setMsgs(list);
      snap.docs.forEach(d=>{
        const m=d.data();
        if(!m.read && m.from!==(isAdmin?"admin":"user")) {
          cRef(threadUid).doc(d.id).update({read:true}).catch(()=>{});
        }
      });
      setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),50);
    });
    return ()=>unsub();
  },[threadUid]);

  const send = async () => {
    if(!msg.trim()||sending) return;
    setSending(true);
    try {
      await cRef(threadUid).add({
        from: isAdmin?"admin":"user",
        text: msg.trim(),
        time: nowTime(),
        date: today(),
        read: false,
        ts:   firebase.firestore.FieldValue.serverTimestamp(),
      });
      setMsg("");
    } finally { setSending(false); }
  };

  const rank = getRank(targetLbp||0);
  const isSelf = m => isAdmin ? m.from==="admin" : m.from==="user";

  return (
    <div style={{minHeight:"100vh",background:"#07070f",fontFamily:ff,color:"#e0e0e0",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      <div style={{background:`linear-gradient(160deg,${rank.color}18,#07070f)`,padding:"48px 20px 16px",flexShrink:0}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"8px 16px",color:"#bbb",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:ff,marginBottom:14}}>← Kembali</button>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {targetAvatar
            ?<img src={targetAvatar} style={{width:44,height:44,borderRadius:"50%",objectFit:"cover",border:`2px solid ${rank.color}55`}}/>
            :<div style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${rank.color},#1a0533)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,border:`2px solid ${rank.color}55`,color:"#fff",flexShrink:0}}>
              {(targetName||"?")[0].toUpperCase()}
            </div>
          }
          <div>
            <div style={{fontSize:16,fontWeight:800}}>{targetName}</div>
            <div style={{fontSize:11,color:"#4ade80",fontWeight:600}}>● Online</div>
          </div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px",paddingBottom:90}}>
        {msgs.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:"#444"}}>
            <div style={{fontSize:32,marginBottom:8}}>💬</div>
            <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Belum ada pesan</div>
            <div style={{fontSize:12}}>Mulai percakapan sekarang</div>
          </div>
        )}
        {msgs.map((m,i)=>{
          const self=isSelf(m);
          const showDate=i===0||msgs[i-1].date!==m.date;
          return (
            <div key={m.id}>
              {showDate&&<div style={{textAlign:"center",fontSize:11,color:"#444",margin:"12px 0",fontWeight:600}}>{m.date}</div>}
              <div style={{display:"flex",justifyContent:self?"flex-end":"flex-start",marginBottom:8}}>
                <div style={{maxWidth:"78%"}}>
                  <div style={{background:self?"linear-gradient(135deg,#7c3aed,#9333ea)":"rgba(255,255,255,0.07)",borderRadius:self?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",fontSize:14,color:"#e0e0e0",lineHeight:1.5,wordBreak:"break-word"}}>{m.text}</div>
                  <div style={{fontSize:10,color:"#444",marginTop:3,textAlign:self?"right":"left"}}>{m.time}{self&&(m.read?" ✓✓":" ✓")}</div>
                </div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:480,margin:"0 auto",padding:"12px 16px",background:"rgba(8,6,18,0.97)",borderTop:"1px solid rgba(255,255,255,0.07)",backdropFilter:"blur(20px)",display:"flex",gap:10,alignItems:"center",paddingBottom:"calc(12px + env(safe-area-inset-bottom,0px))"}}>
        <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ketik pesan..." style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"11px 16px",color:"#e0e0e0",fontSize:15,outline:"none",fontFamily:ff}}/>
        <button onClick={send} disabled={!msg.trim()||sending} style={{width:44,height:44,borderRadius:"50%",background:msg.trim()&&!sending?"linear-gradient(135deg,#7c3aed,#9333ea)":"rgba(255,255,255,0.06)",border:"none",cursor:msg.trim()&&!sending?"pointer":"default",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#fff"}}>➤</button>
      </div>
    </div>
  );
};

// ── MONTHLY TARGET ────────────────────────────────────────────────────────────
const MonthlyTarget = ({user,myCard}) => {
  if(!myCard) return null;
  const pct = Math.min(100,Math.round(((user.monthlySales||0)/myCard.target)*100));
  const rem = Math.max(0,myCard.target-(user.monthlySales||0));
  return (
    <Card style={{marginBottom:16,border:`1px solid ${myCard.color}30`,background:`linear-gradient(135deg,${myCard.color}06,transparent)`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div><div style={{fontSize:11,color:myCard.color,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>🎯 Target Bulanan</div><div style={{fontSize:13,color:"#888"}}>{myCard.name} · {myCard.target} penjualan</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:22,fontWeight:800,color:pct>=100?"#4ade80":myCard.color}}>{pct}%</div><div style={{fontSize:11,color:"#555"}}>{user.monthlySales||0}/{myCard.target}</div></div>
      </div>
      <ProgressBar pct={pct} color={pct>=100?"#4ade80":myCard.color}/>
      {pct>=100
        ?<div style={{marginTop:8,fontSize:12,color:"#4ade80",fontWeight:700,textAlign:"center"}}>✅ Target tercapai! Lanjutkan terus 🔥</div>
        :<div style={{marginTop:8,fontSize:12,color:"#666"}}>Butuh <span style={{color:myCard.color,fontWeight:700}}>{rem} lagi</span> untuk capai target</div>
      }
    </Card>
  );
};

// ════════════════════════════════════════════════════════════════════════════
//  MAIN APP
// ════════════════════════════════════════════════════════════════════════════
function App() {
  // ── Core state ──────────────────────────────────────────────────────────
  const [fbReady,  setFbReady]  = useState(window._fbReady||false);
  const [authUser, setAuthUser] = useState(null);  // Firebase Auth user
  const [profile,  setProfile]  = useState(null);  // Firestore user doc
  const [allUsers, setAllUsers] = useState([]);
  const [settings, setSettings] = useState({newUserBonus:20});
  const [screen,   setScreen]   = useState("loading");
  const [activeNav,setActiveNav]= useState("home");
  const [subPanel, setSubPanel] = useState(null);
  const [adminChatUid,setAdminChatUid] = useState(null);
  const [toast,    setToast]    = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [unreadMap,setUnreadMap]= useState({}); // uid->count for admin inbox

  // ── Auth form ────────────────────────────────────────────────────────────
  const [lUser,setLUser]=useState(""); const [lPass,setLPass]=useState(""); const [lErr,setLErr]=useState("");
  const [rUser,setRUser]=useState(""); const [rPass,setRPass]=useState(""); const [rPass2,setRPass2]=useState(""); const [rErr,setRErr]=useState(""); const [rRef,setRRef]=useState("");

  // ── Forms ────────────────────────────────────────────────────────────────
  const [formSold,setFormSold]=useState(""); const [formStock,setFormStock]=useState("");
  const [formWd,setFormWd]=useState(""); const [lbpConv,setLbpConv]=useState("");
  const [lbpEdit,setLbpEdit]=useState({});

  const showToast = (t,m,dur=3200) => { setToast({t,m}); setTimeout(()=>setToast(null),dur); };

  // ── Wait for Firebase SDK ────────────────────────────────────────────────
  useEffect(()=>{
    if(window._fbReady){ setFbReady(true); return; }
    document.addEventListener("fbReady",()=>setFbReady(true),{once:true});
  },[]);

  // ── Auth listener ────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!fbReady) return;
    const unsub = auth().onAuthStateChanged(async fireUser=>{
      if(fireUser){
        setAuthUser(fireUser);
        await loadProfile(fireUser.uid);
      } else {
        setAuthUser(null); setProfile(null); setScreen("login");
      }
    });
    return ()=>unsub();
  },[fbReady]);

  // ── Load profile ─────────────────────────────────────────────────────────
  const loadProfile = async uid => {
    setScreen("loading");
    try {
      let userData = await getUser(uid);
      if(!userData){ setScreen("login"); return; }
      setProfile(userData);
      await loadSettings();
      if(userData.role==="admin"){
        await loadAllUsers();
        setScreen("adminDash");
      } else {
        setScreen("userDash");
      }
    } catch(e){ console.error(e); setScreen("login"); }
  };

  const loadSettings = async () => {
    try {
      const snap = await sRef().get();
      if(snap.exists) setSettings(snap.data());
    } catch(e){}
  };

  const loadAllUsers = async () => {
    try {
      const all = await getAllUsers();
      setAllUsers(all.filter(u=>u.role!=="admin"));
    } catch(e){}
  };

  // ── Real-time unread listener for admin ──────────────────────────────────
  useEffect(()=>{
    if(!profile||profile.role!=="admin") return;
    const unsubs = allUsers.map(u=>{
      return cRef(u.id).where("from","==","user").where("read","==",false).onSnapshot(snap=>{
        setUnreadMap(prev=>({...prev,[u.id]:snap.size}));
      });
    });
    return ()=>unsubs.forEach(u=>u());
  },[allUsers.length]);

  // ── patchProfile helper ──────────────────────────────────────────────────
  const patchProfile = async patch => {
    try {
      await patchUser(profile.id, patch);
      setProfile(p=>({...p,...patch}));
      // refresh allUsers if admin patched someone
    } catch(e){ showToast("e","Gagal menyimpan: "+e.message); }
  };

  const patchOtherUser = async (uid, patch) => {
    try {
      await patchUser(uid, patch);
      setAllUsers(prev=>prev.map(u=>u.id===uid?{...u,...patch}:u));
    } catch(e){ showToast("e","Error: "+e.message); }
  };

  // ── LOGIN ────────────────────────────────────────────────────────────────
  const login = async () => {
    if(!lUser||!lPass){setLErr("Isi semua field!"); return;}
    setLoading(true); setLErr("");
    try {
      const email = lUser.toLowerCase()==="northgate"||lUser.toLowerCase()==="admin"
        ? ADMIN_EMAIL
        : `${lUser.toLowerCase().replace(/[^a-z0-9]/g,"")}@northgate.app`;
      await auth().signInWithEmailAndPassword(email, lPass);
      setLUser(""); setLPass("");
    } catch(e){
      setLErr(e.code==="auth/invalid-credential"||e.code==="auth/wrong-password"||e.code==="auth/user-not-found"
        ?"Username atau password salah!":`Error: ${e.message}`);
    } finally { setLoading(false); }
  };

  // ── REGISTER ─────────────────────────────────────────────────────────────
  const register = async () => {
    if(!rUser||!rPass||!rPass2){setRErr("Semua field wajib diisi!"); return;}
    if(rPass!==rPass2){setRErr("Password tidak cocok!"); return;}
    if(rPass.length<6){setRErr("Password minimal 6 karakter!"); return;}
    setLoading(true); setRErr("");
    try {
      const email = `${rUser.toLowerCase().replace(/[^a-z0-9]/g,"")}@northgate.app`;
      // Check referral
      let referrerId=null;
      if(rRef.trim()){
        const allU = await getAllUsers();
        const ref = allU.find(u=>u.referralCode===rRef.trim().toUpperCase());
        if(!ref){setRErr("Kode referral tidak valid!"); setLoading(false); return;}
        referrerId=ref.id;
      }
      const cred = await auth().createUserWithEmailAndPassword(email, rPass);
      const code = genCode(rUser);
      const newU = {
        uid:cred.user.uid, username:rUser, email, role:"user",
        lbp:settings.newUserBonus, sales:0, stock:NEW_USER_STOCK, wallet:0, soldToday:0,
        joinDate:new Date().toISOString().split("T")[0], memberCard:null, ownedCards:[],
        setoran:0, withdrawn:0, stockRequests:[],
        lbpHistory:[{type:"earn",amount:settings.newUserBonus,desc:"Bonus signup",date:today()}],
        salesHistory:[], referralCode:code, referredBy:referrerId, referrals:[], monthlySales:0, avatar:null
      };
      await db().collection("users").doc(cred.user.uid).set(newU);
      if(referrerId){
        const referrer = await getUser(referrerId);
        if(referrer) await patchUser(referrerId,{referrals:[...(referrer.referrals||[]),cred.user.uid]});
      }
      showToast("s",`Akun berhasil! Bonus ${settings.newUserBonus} LBP 🎉`);
      setRUser("");setRPass("");setRPass2("");setRRef("");
    } catch(e){
      if(e.code==="auth/email-already-in-use") setRErr("Username sudah dipakai!");
      else setRErr("Error: "+e.message);
    } finally { setLoading(false); }
  };

  const logout = async () => {
    await auth().signOut();
    setProfile(null); setAllUsers([]); setActiveNav("home"); setSubPanel(null);
  };

  // ── SELL ─────────────────────────────────────────────────────────────────
  const submitSales = async () => {
    const sold=parseInt(formSold)||0, stock=parseInt(formStock)||0;
    if(sold<0||stock<0){showToast("e","Nilai tidak boleh negatif!"); return;}
    if(sold>0&&sold>profile.stock){showToast("e","Unit melebihi stok!"); return;}
    const myCard = MEMBER_CARDS.find(c=>c.id===profile.memberCard);
    const lbpGain= (LBP_BASE_PER_SALE+(myCard?.lbpBonus||0))*sold;
    const profit = PROFIT_PER_PRODUK*sold;
    const reqs   = stock>0?[...(profile.stockRequests||[]),{qty:stock,date:today(),status:"Menunggu"}]:(profile.stockRequests||[]);
    const newLbpH= sold>0?[...(profile.lbpHistory||[]),{type:"earn",amount:lbpGain,desc:`${sold} produk terjual`,date:today()}]:(profile.lbpHistory||[]);
    const newSalH= sold>0?[...(profile.salesHistory||[]),{qty:sold,profit,lbp:lbpGain,date:today()}]:(profile.salesHistory||[]);
    const patch  = {stock:profile.stock-sold, sales:profile.sales+sold, soldToday:(profile.soldToday||0)+sold, monthlySales:(profile.monthlySales||0)+sold, wallet:(profile.wallet||0)+profit, lbp:profile.lbp+lbpGain, setoran:(profile.setoran||0)+SETORAN_PER_PRODUK*sold, stockRequests:reqs, lbpHistory:newLbpH, salesHistory:newSalH};
    setLoading(true);
    try {
      await patchProfile(patch);
      // Referral bonus on first sale
      if(profile.sales===0&&sold>0&&profile.referredBy){
        const referrer=await getUser(profile.referredBy);
        if(referrer){
          const refCard=MEMBER_CARDS.find(c=>c.id===referrer.memberCard);
          const refBonus=REFERRAL_LBP_BONUS+Math.round(REFERRAL_LBP_BONUS*(refCard?.referralPct||0)/100);
          const refH=[...(referrer.lbpHistory||[]),{type:"referral",amount:refBonus,desc:`Referral: ${profile.username} jual pertama`,date:today()}];
          await patchUser(profile.referredBy,{lbp:referrer.lbp+refBonus,lbpHistory:refH});
        }
      }
      showToast("s",`${sold>0?`${sold} unit terjual! +${lbpGain} LBP 💰 `:""}${stock>0?`Minta ${stock} stok dikirim.`:""}`);
      setFormSold(""); setFormStock(""); setSubPanel(null);
    } catch(e){ showToast("e","Gagal: "+e.message); }
    finally { setLoading(false); }
  };

  const submitWithdraw = async () => {
    const amt=parseInt(formWd)||0;
    if(amt<=0){showToast("e","Jumlah tidak valid!"); return;}
    if(amt>profile.wallet){showToast("e",`Saldo tidak cukup! Maks ${fmt(profile.wallet)}`); return;}
    setLoading(true);
    try {
      await patchProfile({wallet:profile.wallet-amt, withdrawn:(profile.withdrawn||0)+amt});
      showToast("s",`Withdraw ${fmt(amt)} berhasil diajukan!`);
      setFormWd(""); setSubPanel(null);
    } finally { setLoading(false); }
  };

  const submitLbpConvert = async () => {
    const lbp=parseInt(lbpConv)||0;
    if(lbp<=0){showToast("e","Jumlah LBP tidak valid!"); return;}
    if(lbp>profile.lbp){showToast("e","LBP tidak cukup!"); return;}
    const idr=lbp*LBP_TO_IDR;
    const newH=[...(profile.lbpHistory||[]),{type:"convert",amount:lbp,desc:`Konversi → ${fmt(idr)}`,date:today()}];
    setLoading(true);
    try {
      await patchProfile({lbp:profile.lbp-lbp, wallet:(profile.wallet||0)+idr, lbpHistory:newH});
      showToast("s",`${lbp} LBP → ${fmt(idr)} masuk wallet!`);
      setLbpConv("");
    } finally { setLoading(false); }
  };

  const buyCard = async card => {
    if(profile.ownedCards?.includes(card.id)){showToast("e","Kartu sudah dimiliki!"); return;}
    if(profile.lbp<card.price){showToast("e",`Butuh ${card.price} LBP!`); return;}
    const newH=[...(profile.lbpHistory||[]),{type:"spend",amount:card.price,desc:`Beli ${card.name}`,date:today()}];
    setLoading(true);
    try {
      await patchProfile({lbp:profile.lbp-card.price, ownedCards:[...(profile.ownedCards||[]),card.id], memberCard:card.id, lbpHistory:newH});
      showToast("s",`${card.icon} ${card.name} berhasil dibeli!`);
      setSubPanel(null);
    } finally { setLoading(false); }
  };

  // ── AVATAR UPLOAD ────────────────────────────────────────────────────────
  const saveAvatar = async dataUrl => {
    setLoading(true);
    try {
      if(!dataUrl){
        if(profile.avatar){
          try{ await storage().ref(`avatars/${profile.id}`).delete(); }catch(e){}
        }
        await patchProfile({avatar:null});
        showToast("s","Foto profil dihapus.");
      } else {
        const storageRef = storage().ref(`avatars/${profile.id}`);
        await storageRef.putString(dataUrl,"data_url");
        const url = await storageRef.getDownloadURL();
        await patchProfile({avatar:url});
        showToast("s","Foto profil diperbarui! ✓");
      }
      setSubPanel(null);
    } catch(e){ showToast("e","Upload gagal: "+e.message); }
    finally { setLoading(false); }
  };

  // ─────────────────────────────────────────────────────────────────────────
  const ps = {minHeight:"100vh",background:"#07070f",fontFamily:ff,color:"#e0e0e0",paddingBottom:76,maxWidth:480,margin:"0 auto",position:"relative"};

  if(!fbReady||screen==="loading") return <Spinner text={!fbReady?"Menghubungkan...":"Memuat data..."}/>;

  // ══════════════════════════════════════════════════════════════════════════
  //  AUTH SCREENS
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="login") return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 30% 0%,#1a0533 0%,#07070f 60%)",fontFamily:ff,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 24px"}}>
      <Toast msg={toast}/>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{fontSize:44,marginBottom:10}}>◈</div>
        <div style={{fontSize:11,letterSpacing:6,color:"#9333ea",textTransform:"uppercase",marginBottom:6}}>Sales Network</div>
        <div style={{fontSize:32,fontWeight:800,background:"linear-gradient(135deg,#e8e8e8,#9333ea)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>NORTHGATE</div>
      </div>
      {lErr&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:12,padding:"12px 16px",fontSize:13,color:"#ff7070",marginBottom:16,textAlign:"center"}}>⚠ {lErr}</div>}
      <Inp label="Username" value={lUser} onChange={e=>setLUser(e.target.value)} placeholder="Masukkan username" autoCapitalize="none"/>
      <Inp label="Password" type="password" value={lPass} onChange={e=>setLPass(e.target.value)} placeholder="Masukkan password" onKeyDown={e=>e.key==="Enter"&&login()}/>
      <div style={{marginBottom:14}}/>
      <Btn onClick={login} loading={loading}>Masuk →</Btn>
      <div style={{display:"flex",alignItems:"center",gap:10,margin:"20px 0",color:"#333",fontSize:12}}><div style={{flex:1,height:1,background:"#1e1e2e"}}/>atau<div style={{flex:1,height:1,background:"#1e1e2e"}}/></div>
      <Btn onClick={()=>{setScreen("register");setLErr("");}} variant="ghost">Buat Akun Baru</Btn>
      <div style={{textAlign:"center",marginTop:28,fontSize:10,color:"#222",letterSpacing:2}}>NORTHGATE v4.0 · Firebase</div>
    </div>
  );

  if(screen==="register") return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 30% 0%,#1a0533 0%,#07070f 60%)",fontFamily:ff,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 24px"}}>
      <Toast msg={toast}/>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{fontSize:44,marginBottom:10}}>✦</div>
        <div style={{fontSize:11,letterSpacing:6,color:"#9333ea",textTransform:"uppercase",marginBottom:6}}>Sales Network</div>
        <div style={{fontSize:32,fontWeight:800,background:"linear-gradient(135deg,#e8e8e8,#9333ea)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DAFTAR</div>
        <div style={{fontSize:13,color:"#666",marginTop:6,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>Bonus <LBPDisplay amount={settings.newUserBonus} size={15} fontSize={13}/> saat daftar!</div>
      </div>
      {rErr&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:12,padding:"12px 16px",fontSize:13,color:"#ff7070",marginBottom:16,textAlign:"center"}}>⚠ {rErr}</div>}
      <Inp label="Username" value={rUser} onChange={e=>setRUser(e.target.value)} placeholder="Pilih username" autoCapitalize="none"/>
      <Inp label="Password" type="password" value={rPass} onChange={e=>setRPass(e.target.value)} placeholder="Min. 6 karakter"/>
      <Inp label="Konfirmasi Password" type="password" value={rPass2} onChange={e=>setRPass2(e.target.value)} placeholder="Ulangi password"/>
      <Inp label="Kode Referral (opsional)" value={rRef} onChange={e=>setRRef(e.target.value.toUpperCase())} placeholder="Contoh: GOPAL87" style={{textTransform:"uppercase",letterSpacing:2}}/>
      <div style={{marginBottom:14}}/>
      <Btn onClick={register} loading={loading}>Buat Akun →</Btn>
      <div style={{height:12}}/>
      <Btn onClick={()=>{setScreen("login");setRErr("");}} variant="ghost">← Kembali ke Login</Btn>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  //  ADMIN DASHBOARD
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="adminDash"){
    const totalUnread = Object.values(unreadMap).reduce((s,n)=>s+n,0);
    const sorted = [...allUsers].sort((a,b)=>b.lbp-a.lbp);
    const totalSetoran = allUsers.reduce((s,u)=>s+(u.setoran||0),0);
    const totalSales   = allUsers.reduce((s,u)=>s+u.sales,0);
    const adminNav = [
      {id:"home",    icon:"📊", label:"Overview"},
      {id:"users",   icon:"👥", label:"Users"},
      {id:"finance", icon:"💰", label:"Keuangan"},
      {id:"inbox",   icon:"💬", label:"Inbox"},
      {id:"setting", icon:"⚙️", label:"Setting"},
    ];

    // Admin chat view
    if(adminChatUid){
      const tu = allUsers.find(u=>u.id===adminChatUid);
      if(!tu){setAdminChatUid(null);}

            <SecTitle>Member Cards</SecTitle>

              <div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 0",borderBottom:i<MEMBER_CARDS.length-1?"1px solid rgba(255,255,255,0.05)":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>{c.icon}</span>
                  <div><div style={{fontSize:13,fontWeight:700,color:c.color}}>{c.name}</div><LBPDisplay amount={c.price} size={11} fontSize={11}/></div>

                <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"#ffd700",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}><LBPCoin size={13}/>{LBP_BASE_PER_SALE+c.lbpBonus}</div><div style={{fontSize:10,color:"#555"}}>per produk</div></div>
              </div>
            ))}</Card>
          </>}
        </div>
        <BottomNav items={adminNav} active={activeNav} onNav={n=>{setActiveNav(n); if(n==="users")loadAllUsers();}} unreadCount={totalUnread}/>
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════════════════════
  //  USER DASHBOARD
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="userDash"&&profile){
    const rank   = getRank(profile.lbp);
    const myCard = MEMBER_CARDS.find(c=>c.id===profile.memberCard);
    const [allU,setAllU] = useState([]);
    const [shopDetail,setShopDetail] = useState(null);

    useEffect(()=>{
      getAllUsers().then(u=>setAllU(u.filter(x=>x.role!=="admin")));
    },[profile.lbp, profile.sales]);

    const sorted2 = [...allU].sort((a,b)=>b.lbp-a.lbp);
    const myPos   = sorted2.findIndex(u=>u.id===profile.id)+1;

    // Unread from admin
    const [unreadAdmin,setUnreadAdmin] = useState(0);
    useEffect(()=>{
      const unsub = cRef(profile.id).where("from","==","admin").where("read","==",false).onSnapshot(snap=>setUnreadAdmin(snap.size));
      return ()=>unsub();
    },[profile.id]);

    const userNav=[
      {id:"home",   icon:"🏠", label:"Home"},
      {id:"shop",   icon:"🛍️",label:"Shop"},
      {id:"ranking",icon:"🏆", label:"Ranking"},
      {id:"profil", icon:"👤", label:"Profil"},
    ];

    // Chat panel
    if(subPanel==="chat") return (
      <ChatView currentUser={profile} targetName="Northgate Admin" targetAvatar={null} targetLbp={9999} threadUid={profile.id} isAdmin={false} onBack={()=>setSubPanel(null)}/>
    );

    // Avatar upload
    if(subPanel==="avatar") return (
      <AvatarUpload user={profile} onSave={saveAvatar} onBack={()=>setSubPanel(null)} loading={loading}/>
    );

    // Shop detail
    if(shopDetail){
      const card=shopDetail; const owned=profile.ownedCards?.includes(card.id); const active=profile.memberCard===card.id; const canBuy=profile.lbp>=card.price;
      return (
        <div style={ps}>
          <Toast msg={toast}/>
          <div style={{background:`linear-gradient(160deg,${card.color}22,#07070f)`,padding:"48px 20px 24px"}}>
            <button onClick={()=>setShopDetail(null)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"8px 16px",color:"#ccc",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:ff,marginBottom:20}}>← Kembali</button>
            <div style={{fontSize:56,textAlign:"center",marginBottom:8}}>{card.icon}</div>
            <div style={{fontSize:26,fontWeight:800,color:card.color,textAlign:"center"}}>{card.name}</div>
            <div style={{textAlign:"center",marginTop:8}}><LBPDisplay amount={card.price} size={22} fontSize={24}/></div>
          </div>
          <div style={{padding:"20px 16px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
              <Card><div style={{fontSize:11,color:"#666",marginBottom:6}}>LBP Base</div><LBPDisplay amount={LBP_BASE_PER_SALE} size={16} fontSize={20}/><div style={{fontSize:10,color:"#555"}}>per produk</div></Card>
              <Card style={{background:`${card.color}10`,border:`1px solid ${card.color}30`}}><div style={{fontSize:11,color:card.color,marginBottom:6}}>🎁 Bonus</div><div style={{fontSize:20,fontWeight:800,color:card.color}}>+{card.lbpBonus} <LBPCoin size={16}/></div><div style={{fontSize:10,color:"#555"}}>per produk</div></Card>
              <Card style={{gridColumn:"1/-1",background:"linear-gradient(135deg,rgba(255,215,0,0.1),transparent)",border:"1px solid rgba(255,215,0,0.3)"}}><div style={{fontSize:11,color:"#ffd700",marginBottom:6}}>⚡ TOTAL</div><LBPDisplay amount={LBP_BASE_PER_SALE+card.lbpBonus} size={22} fontSize={26}/><span style={{fontSize:12,color:"#888",marginLeft:8}}>= {fmt((LBP_BASE_PER_SALE+card.lbpBonus)*LBP_TO_IDR)}/produk</span></Card>
            </div>
            <SecTitle>Fasilitas</SecTitle>
            <Card style={{marginBottom:24}}>
              {[`Target ${card.target} penjualan/bulan`,`+${card.lbpBonus} LBP bonus/produk (total ${LBP_BASE_PER_SALE+card.lbpBonus} LBP)`,`Referral bonus +${Math.round(REFERRAL_LBP_BONUS*(1+card.referralPct/100))} LBP/teman`,`Badge ${card.name}`].map((p,i)=>(
                <div key={i} style={{display:"flex",gap:10,padding:"10px 0",borderBottom:i<3?"1px solid rgba(255,255,255,0.05)":"none"}}>
                  <span style={{color:card.color,fontWeight:700}}>✓</span><span style={{fontSize:14,color:"#bbb"}}>{p}</span>
                </div>
              ))}
            </Card>
            {active?<div style={{textAlign:"center",padding:16,background:`${card.color}15`,border:`1px solid ${card.color}35`,borderRadius:14,fontSize:15,color:card.color,fontWeight:700}}>✓ Kartu Aktif</div>
            :owned?<Btn onClick={async()=>{await patchProfile({memberCard:card.id}); showToast("s",`${card.icon} Diaktifkan!`); setShopDetail(null);}}>Aktifkan Kartu</Btn>
            :<Btn onClick={()=>canBuy&&buyCard(card)} disabled={!canBuy} loading={loading} style={{background:canBuy?`linear-gradient(135deg,${card.color}cc,${card.color})`:undefined}}>{canBuy?`Beli — ${card.price} LBP`:`Kurang ${card.price-profile.lbp} LBP lagi`}</Btn>}
            <div style={{height:32}}/>
          </div>
        </div>
      );
    }

    // Sub-panels
    if(subPanel==="sales") return (
      <div style={ps}>
        <Toast msg={toast}/>
        <BackHeader title="Panel Penjualan" sub="Laporan" accent="#4ade80" onBack={()=>setSubPanel(null)}/>
        <div style={{padding:"20px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[{l:"STOK",v:profile.stock,c:"#60efff",s:"tersedia"},{l:"HARI INI",v:profile.soldToday,c:"#4ade80",s:"terjual"},{l:"TOTAL",v:profile.sales,c:"#ffd700",s:"all time"},{l:"OMZET",v:fmtK(profile.sales*HARGA_JUAL),c:"#f97316",s:""}].map(x=>(
              <Card key={x.l}><div style={{fontSize:10,color:x.c,fontWeight:700,letterSpacing:1,marginBottom:6}}>{x.l}</div><div style={{fontSize:x.l==="OMZET"?18:26,fontWeight:800,color:x.c}}>{x.v}</div>{x.s&&<div style={{fontSize:11,color:"#555"}}>{x.s}</div>}</Card>
            ))}
          </div>
          <MonthlyTarget user={profile} myCard={myCard}/>
          {myCard&&<div style={{background:`${myCard.color}10`,border:`1px solid ${myCard.color}30`,borderRadius:14,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>{myCard.icon}</span>
            <div><div style={{fontSize:13,fontWeight:700,color:myCard.color}}>{myCard.name}</div><div style={{fontSize:11,color:"#777",display:"flex",alignItems:"center",gap:3}}>Total {LBP_BASE_PER_SALE+myCard.lbpBonus} <LBPCoin size={11}/>/produk</div></div>
          </div>}
          <SecTitle>Form Laporan</SecTitle>
          <Card style={{marginBottom:16}}>
            <div style={{background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"12px 14px",marginBottom:14}}>

              <InfoRow label="Setoran admin" value={`– ${fmt(SETORAN_PER_PRODUK)}`} color="#ef4444"/>
              <InfoRow label="Profit bersih" value={fmt(PROFIT_PER_PRODUK)} color="#4ade80"/>
              <InfoRow label="LBP per produk" value={`${LBP_BASE_PER_SALE+(myCard?.lbpBonus||0)} LBP`} color="#ffd700" border={false}/>
            </div>
            <Inp label="🛒 Terjual (unit)" type="number" inputMode="numeric" value={formSold} onChange={e=>setFormSold(e.target.value)} placeholder="Contoh: 5"/>
            {formSold&&parseInt(formSold)>0&&<div style={{background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
              <InfoRow label="Masuk wallet" value={fmt((parseInt(formSold)||0)*PROFIT_PER_PRODUK)} color="#4ade80"/>
              <InfoRow label="LBP didapat" value={`+${(parseInt(formSold)||0)*(LBP_BASE_PER_SALE+(myCard?.lbpBonus||0))} LBP`} color="#ffd700" border={false}/>
            </div>}
            <Inp label="📦 Minta Stok (opsional)" type="number" inputMode="numeric" value={formStock} onChange={e=>setFormStock(e.target.value)} placeholder="Contoh: 20"/>
            <Btn onClick={submitSales} loading={loading}>Kirim Laporan ✓</Btn>
          </Card>
          {(profile.salesHistory||[]).length>0&&<>
            <SecTitle>Riwayat Penjualan</SecTitle>
            <Card style={{marginBottom:16}}>
              {(profile.salesHistory||[]).slice().reverse().slice(0,8).map((s,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <div><div style={{fontSize:13,fontWeight:600}}>{s.qty} unit</div><div style={{fontSize:11,color:"#555"}}>{s.date}</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:12,color:"#4ade80",fontWeight:700}}>+{fmt(s.profit)}</div><LBPDisplay amount={"+"+s.lbp} size={12} fontSize={11} color="#ffd700"/></div>
                </div>
              ))}
            </Card>
          </>}
          {(profile.stockRequests||[]).length>0&&<>
            <SecTitle>Permintaan Stok</SecTitle>
            <Card>{(profile.stockRequests||[]).slice().reverse().slice(0,5).map((r2,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <div><div style={{fontSize:13,fontWeight:600}}>+{r2.qty} unit</div><div style={{fontSize:11,color:"#555"}}>{r2.date}</div></div>
                <span style={{fontSize:11,fontWeight:700,color:r2.status==="Menunggu"?"#ffd700":"#4ade80",background:r2.status==="Menunggu"?"rgba(255,215,0,0.1)":"rgba(74,222,128,0.1)",border:`1px solid ${r2.status==="Menunggu"?"rgba(255,215,0,0.3)":"rgba(74,222,128,0.3)"}`,borderRadius:20,padding:"3px 10px"}}>{r2.status}</span>
              </div>
            ))}</Card>
          </>}
          <div style={{height:16}}/>
        </div>
      </div>
    );

    if(subPanel==="wallet") return (
      <div style={ps}>
        <Toast msg={toast}/>
        <BackHeader title="Panel Wallet" sub="Keuangan" accent="#c084fc" onBack={()=>setSubPanel(null)}/>
        <div style={{padding:"20px 16px"}}>
          <Card style={{marginBottom:12,background:"linear-gradient(135deg,rgba(147,51,234,0.15),transparent)",border:"1px solid rgba(147,51,234,0.3)"}}>
            <div style={{fontSize:11,color:"#888",fontWeight:700,letterSpacing:1,marginBottom:8}}>SALDO WALLET</div>
            <div style={{fontSize:36,fontWeight:800,color:"#c084fc"}}>{fmtK(profile.wallet||0)}</div>
            <div style={{fontSize:12,color:"#666",marginTop:4}}>{fmt(profile.wallet||0)}</div>
          </Card>
          <Card style={{marginBottom:16}}>
            <InfoRow label="Total Omzet" value={fmt(profile.sales*HARGA_JUAL)}/>
            <InfoRow label="Setoran ke Admin" value={fmt(profile.setoran||0)} color="#ef4444"/>
            <InfoRow label="Total Profit" value={fmt(profile.sales*PROFIT_PER_PRODUK)} color="#4ade80"/>
            <InfoRow label="Sudah Withdraw" value={fmt(profile.withdrawn||0)} color="#a78bfa"/>
            <InfoRow label="Saldo Saat Ini" value={fmt(profile.wallet||0)} color="#c084fc" border={false}/>
          </Card>
          <SecTitle>Tarik Saldo</SecTitle>
          <Card>
            <Inp label={`Jumlah Withdraw (Maks. ${fmt(profile.wallet||0)})`} type="number" inputMode="numeric" value={formWd} onChange={e=>setFormWd(e.target.value)} placeholder={`Maks ${fmtK(profile.wallet||0)}`}/>
            <Btn variant="success" onClick={submitWithdraw} loading={loading}>Ajukan Withdraw ↓</Btn>
          </Card>
        </div>
      </div>
    );

    if(subPanel==="lbp") return (
      <div style={ps}>
        <Toast msg={toast}/>
        <BackHeader title="Panel LBP" sub="LustBurnPoints" accent="#ffd700" onBack={()=>setSubPanel(null)}/>
        <div style={{padding:"20px 16px"}}>
          <Card style={{marginBottom:12,background:"linear-gradient(135deg,rgba(255,215,0,0.12),transparent)",border:"1px solid rgba(255,215,0,0.3)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div><LBPDisplay amount={profile.lbp} size={28} fontSize={36}/><div style={{fontSize:12,color:"#666",marginTop:4}}>≈ {fmt(profile.lbp*LBP_TO_IDR)}</div></div>
              <div style={{textAlign:"right"}}><Badge c={rank.color}>{rank.label}</Badge><div style={{fontSize:11,color:"#555",marginTop:6}}>#{myPos} leaderboard</div></div>
            </div>
          </Card>
          {/* Tier progress */}
          <Card style={{marginBottom:12}}>
            {(()=>{
              const tiers=[{min:0,max:100,l:"Starter → Bronze",c:"#cd7f32"},{min:100,max:250,l:"Bronze → Silver",c:"#c0c0c0"},{min:250,max:500,l:"Silver → Gold",c:"#ffd700"},{min:500,max:1000,l:"Gold → Diamond",c:"#60efff"},{min:1000,max:2500,l:"Diamond → Master",c:"#ff6bff"}];
              const cur=tiers.find(t=>profile.lbp<t.max);
              if(!cur) return <div style={{textAlign:"center",fontSize:15,color:"#ff6bff",fontWeight:700,padding:"8px 0"}}>👑 Kamu di peringkat MASTER!</div>;
              const pct=Math.min(100,Math.round(((profile.lbp-cur.min)/(cur.max-cur.min))*100));
              return <><div style={{display:"flex",justifyContent:"space-between",marginBottom:10,fontSize:13}}><span style={{color:cur.c,fontWeight:700}}>{cur.l}</span><span style={{color:"#555"}}>{pct}%</span></div><ProgressBar pct={pct} color={cur.c}/><div style={{marginTop:8,fontSize:12,color:"#555",display:"flex",justifyContent:"space-between"}}><span>{profile.lbp} LBP</span><span>{cur.max-profile.lbp} lagi</span></div></>;
            })()}
          </Card>
          <SecTitle>Konversi LBP → Rupiah</SecTitle>
          <Card style={{marginBottom:16}}>
            <div style={{background:"rgba(255,215,0,0.07)",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#bbb",display:"flex",alignItems:"center",gap:6}}>
              <LBPCoin size={14}/><span>1 LBP = <span style={{color:"#ffd700",fontWeight:700}}>{fmt(LBP_TO_IDR)}</span> · masuk wallet</span>
            </div>
            <Inp label="Jumlah LBP" type="number" inputMode="numeric" value={lbpConv} onChange={e=>setLbpConv(e.target.value)} placeholder={`Maks ${profile.lbp} LBP`}/>
            {lbpConv&&parseInt(lbpConv)>0&&<div style={{background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#4ade80",fontWeight:700,textAlign:"center"}}>
              <LBPDisplay amount={parseInt(lbpConv)} size={15} fontSize={13}/> → {fmt((parseInt(lbpConv)||0)*LBP_TO_IDR)}
            </div>}
            <Btn onClick={submitLbpConvert} loading={loading} style={{background:"linear-gradient(135deg,#854d0e,#ca8a04)"}}>Konversi LBP → Rupiah ✦</Btn>
          </Card>
          <SecTitle>Riwayat LBP</SecTitle>
          {(profile.lbpHistory||[]).length===0
            ?<Card><div style={{textAlign:"center",color:"#444",fontSize:13,padding:"10px 0"}}>Belum ada riwayat</div></Card>
            :<Card>{(profile.lbpHistory||[]).slice().reverse().slice(0,12).map((h,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <div><div style={{fontSize:12,fontWeight:600,color:"#ddd"}}>{h.desc}</div><div style={{fontSize:10,color:"#555"}}>{h.date}</div></div>
                <LBPDisplay amount={(h.type==="earn"||h.type==="referral"?"+":"-")+h.amount} size={12} fontSize={12} color={h.type==="earn"||h.type==="referral"?"#4ade80":"#ef4444"}/>
              </div>
            ))}</Card>}
          <div style={{height:16}}/>
          <SecTitle>🎉 Event Aktif</SecTitle>
          {ACTIVE_EVENTS.map(ev=>(
            <Card key={ev.id} style={{marginBottom:10,border:`1px solid ${ev.color}30`,background:`linear-gradient(135deg,${ev.color}08,transparent)`}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:800,color:ev.color,marginBottom:4}}>{ev.title}</div><div style={{fontSize:12,color:"#777",lineHeight:1.5,marginBottom:6}}>{ev.desc}</div><div style={{fontSize:11,color:"#ef4444",fontWeight:700}}>⏱ {getCountdown(ev.expiresDate)}</div></div>
                <div style={{background:`${ev.color}20`,border:`1px solid ${ev.color}40`,borderRadius:10,padding:"6px 10px",fontSize:12,fontWeight:800,color:ev.color,whiteSpace:"nowrap",flexShrink:0,alignSelf:"flex-start"}}>{ev.reward}</div>
              </div>
            </Card>
          ))}
          <div style={{height:16}}/>
        </div>
      </div>
    );

    // ── Main user pages ─────────────────────────────────────────────────────
    return (
      <div style={ps}>
        <Toast msg={toast}/>

        {activeNav==="home"&&<>
          <div style={{background:"linear-gradient(160deg,#1a0533,#07070f)",padding:"48px 20px 24px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div><div style={{fontSize:12,color:"#9333ea",fontWeight:700,letterSpacing:1}}>◈ NORTHGATE SALES</div><div style={{fontSize:22,fontWeight:800,color:"#e0e0e0",marginTop:2}}>Halo, {profile.username}! 👋</div></div>
              <Avatar user={profile} size={46} showBadge={true} badgeCount={unreadAdmin} onClick={()=>{setActiveNav("profil");setSubPanel(null);}}/>
            </div>
            <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${rank.color}30`,borderRadius:18,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div><div style={{fontSize:11,color:"#666",fontWeight:700,letterSpacing:1,marginBottom:4,display:"flex",alignItems:"center",gap:5}}><LBPCoin size={14}/>LBP SAAT INI</div><LBPDisplay amount={profile.lbp} size={26} fontSize={32}/><div style={{fontSize:11,color:"#555",marginTop:2}}>#{myPos} dari {sorted2.length}</div></div>

            <div style={{height:16}}/>

                <Card key={x.l} onClick={x.p?()=>setSubPanel(x.p):undefined} style={{border:`1px solid ${x.c}25`,position:"relative",overflow:"hidden"}}>
                  <div style={{fontSize:10,color:x.c,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{x.l}</div>

            {myCard
              ?<Card style={{marginBottom:16,border:`1px solid ${myCard.color}30`,background:`linear-gradient(135deg,${myCard.color}08,transparent)`}} onClick={()=>setActiveNav("shop")}>
                <div style={{display:"flex",alignItems:"center",gap:14}}><span style={{fontSize:36}}>{myCard.icon}</span><div style={{flex:1}}><div style={{fontSize:16,fontWeight:800,color:myCard.color}}>{myCard.name}</div><div style={{fontSize:12,color:"#666",marginTop:4,display:"flex",alignItems:"center",gap:3}}>Total {LBP_BASE_PER_SALE+myCard.lbpBonus} <LBPCoin size={12}/>/produk</div></div><span style={{color:"#555",fontSize:18}}>›</span></div>
              </Card>
              :<Card style={{marginBottom:16,textAlign:"center"}}><div style={{fontSize:32,marginBottom:8}}>🃏</div><div style={{fontSize:13,color:"#666",marginBottom:12}}>Belum punya member card</div><Btn small variant="ghost" onClick={()=>setActiveNav("shop")}>Lihat Shop →</Btn></Card>
            }

            <SecTitle>🎉 Event Aktif</SecTitle>
            {ACTIVE_EVENTS.slice(0,2).map(ev=>(
              <Card key={ev.id} style={{marginBottom:10,border:`1px solid ${ev.color}30`,background:`linear-gradient(135deg,${ev.color}06,transparent)`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                  <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:ev.color}}>{ev.title}</div><div style={{fontSize:11,color:"#666",marginTop:3}}>{ev.desc}</div><div style={{fontSize:10,color:"#ef4444",fontWeight:600,marginTop:4}}>⏱ {getCountdown(ev.expiresDate)}</div></div>
                  <div style={{background:`${ev.color}20`,border:`1px solid ${ev.color}40`,borderRadius:10,padding:"6px 10px",fontSize:11,fontWeight:800,color:ev.color,whiteSpace:"nowrap",flexShrink:0}}>{ev.reward}</div>
                </div>
              </Card>
            ))}
            <div style={{height:12}}/>
          </div>
        </>}

        {activeNav==="shop"&&<>
          <div style={{background:"linear-gradient(160deg,#1a0533,#07070f)",padding:"48px 20px 20px",marginBottom:4}}>
            <div style={{fontSize:11,color:"#9333ea",fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>◈ Toko</div>
            <div style={{fontSize:24,fontWeight:800,color:"#e0e0e0",marginTop:2}}>Member Card Shop</div>
            <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,color:"#666"}}>Saldo:</span><LBPDisplay amount={profile.lbp} size={20} fontSize={18}/></div>
          </div>
          <div style={{padding:"0 16px"}}>
            <div style={{height:12}}/>
            {MEMBER_CARDS.map(card=>{
              const owned=profile.ownedCards?.includes(card.id); const active=profile.memberCard===card.id; const canBuy=profile.lbp>=card.price;
              return (
                <div key={card.id} onClick={()=>setShopDetail(card)} style={{background:active?`linear-gradient(135deg,${card.color}10,#07070f)`:"rgba(255,255,255,0.03)",border:`1px solid ${active?card.color+"50":card.color+"20"}`,borderRadius:18,padding:"16px 18px",marginBottom:12,display:"flex",alignItems:"center",gap:16,cursor:"pointer"}}>
                  <div style={{fontSize:36,flexShrink:0}}>{card.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:16,color:card.color}}>{card.name}</div>
                    <div style={{fontSize:12,color:"#666",marginTop:3,display:"flex",alignItems:"center",gap:3}}>+{card.lbpBonus} <LBPCoin size={12}/>/produk · Total {LBP_BASE_PER_SALE+card.lbpBonus} <LBPCoin size={12}/></div>
                    <div style={{marginTop:6}}>{active?<Badge c={card.color} sm>AKTIF</Badge>:owned?<Badge c="#666" sm>DIMILIKI</Badge>:canBuy?<Badge c={card.color} sm>{card.price} LBP</Badge>:<Badge c="#444" sm>Butuh {card.price} LBP</Badge>}</div>
                  </div>
                  <div style={{fontSize:18,color:"#444"}}>›</div>
                </div>
              );
            })}
            <div style={{height:12}}/>
          </div>
        </>}

        {activeNav==="ranking"&&<>
          <div style={{background:"linear-gradient(160deg,#1a0533,#07070f)",padding:"48px 20px 20px",marginBottom:4}}>
            <div style={{fontSize:11,color:"#9333ea",fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>◈ Papan Skor</div>
            <div style={{fontSize:24,fontWeight:800,color:"#e0e0e0",marginTop:2}}>Leaderboard</div>
          </div>
          <div style={{padding:"0 16px"}}>
            <div style={{height:12}}/>
            {sorted2.length===0&&<Card><div style={{textAlign:"center",color:"#444",padding:"20px 0",fontSize:13}}>Belum ada data</div></Card>}
            {sorted2.map((u,i)=>{
              const r=getRank(u.lbp); const medals=["🥇","🥈","🥉"]; const isMe=u.id===profile.id; const uCard=MEMBER_CARDS.find(c=>c.id===u.memberCard);
              return (
                <Card key={u.id} style={{marginBottom:10,display:"flex",alignItems:"center",gap:14,border:isMe?`1px solid ${r.color}45`:"1px solid rgba(255,255,255,0.07)",background:isMe?`linear-gradient(135deg,${r.color}10,#07070f)`:"rgba(255,255,255,0.03)"}}>
                  <div style={{fontSize:22,minWidth:34,textAlign:"center"}}>{i<3?medals[i]:<span style={{fontSize:14,color:"#555",fontWeight:700}}>#{i+1}</span>}</div>
                  <Avatar user={u} size={42}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:15,color:isMe?r.color:"#e0e0e0"}}>{u.username}{isMe&&<span style={{fontSize:11,color:"#555"}}> (kamu)</span>}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3,flexWrap:"wrap"}}>
                      <Badge c={r.color} sm>{r.label}</Badge>
                      {uCard&&<Badge c={uCard.color} sm>{uCard.icon}</Badge>}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}><LBPDisplay amount={u.lbp} size={16} fontSize={18}/><div style={{fontSize:10,color:"#555",marginTop:2}}>{u.sales} sales</div></div>
                </Card>
              );
            })}
          </div>
        </>}

        {activeNav==="profil"&&<>
          <div style={{background:"linear-gradient(160deg,#1a0533,#07070f)",padding:"48px 20px 28px"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
              <div style={{position:"relative"}}>
                <Avatar user={profile} size={90}/>
                <button onClick={()=>setSubPanel("avatar")} style={{position:"absolute",bottom:2,right:2,background:"#9333ea",border:"none",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:13}}>📷</button>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:800,color:"#e0e0e0"}}>{profile.username}</div>
                <div style={{marginTop:4}}><Badge c={rank.color}>{rank.label}</Badge></div>
                <div style={{fontSize:12,color:"#555",marginTop:6}}>Bergabung {profile.joinDate}</div>
              </div>
            </div>
          </div>
          <div style={{padding:"16px 16px"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
              {[{l:"Sales",v:profile.sales,c:"#4ade80"},{l:"LBP",v:profile.lbp,c:"#ffd700",coin:true},{l:"Referral",v:(profile.referrals||[]).length,c:"#60efff"}].map(x=>(
                <Card key={x.l} style={{textAlign:"center",padding:"14px 8px"}}>
                  <div style={{fontSize:10,color:"#555",marginBottom:4,display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>{x.coin&&<LBPCoin size={10}/>}{x.l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:x.c}}>{x.v}</div>
                </Card>
              ))}
            </div>

            <SecTitle>💬 Chat dengan Admin</SecTitle>
            <Card onClick={()=>setSubPanel("chat")} style={{marginBottom:16,cursor:"pointer",border:unreadAdmin>0?"1px solid rgba(147,51,234,0.4)":"1px solid rgba(255,255,255,0.08)",background:unreadAdmin>0?"rgba(147,51,234,0.06)":"rgba(255,255,255,0.03)"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:46,height:46,borderRadius:"50%",background:"linear-gradient(135deg,#9333ea,#1a0533)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,border:"2px solid rgba(147,51,234,0.5)",position:"relative",flexShrink:0}}>
                  N
                  {unreadAdmin>0&&<div style={{position:"absolute",top:-3,right:-3,background:"#ef4444",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#fff",border:"2px solid #07070f"}}>{unreadAdmin}</div>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15}}>Northgate Admin</div>
                  <div style={{fontSize:12,color:"#555",marginTop:2}}>Kirim pesan ke admin</div>
                </div>
                {unreadAdmin>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:20,padding:"3px 8px",fontSize:11,fontWeight:800}}>{unreadAdmin} baru</span>}
                <span style={{color:"#555",fontSize:18}}>›</span>
              </div>
            </Card>

            <SecTitle>🖼 Foto Profil</SecTitle>
            <Card onClick={()=>setSubPanel("avatar")} style={{marginBottom:16,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
              <Avatar user={profile} size={52}/>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>Edit Foto Profil</div><div style={{fontSize:12,color:"#555",marginTop:2}}>{profile.avatar?"Tap untuk ganti foto":"Belum ada foto"}</div></div>
              <span style={{color:"#555",fontSize:18}}>›</span>
            </Card>

            <SecTitle>👥 Kode Referral</SecTitle>
            <Card style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#4ade80",fontWeight:700,letterSpacing:2,marginBottom:8}}>KODE KAMU</div>
              <div style={{fontSize:22,fontWeight:800,color:"#4ade80",letterSpacing:4,fontFamily:"monospace",marginBottom:8}}>{profile.referralCode}</div>
              <div style={{fontSize:12,color:"#555"}}>{(profile.referrals||[]).length} teman diajak · Bonus +{REFERRAL_LBP_BONUS}+ LBP/teman</div>
            </Card>

            <Btn variant="danger" onClick={logout}>Logout</Btn>
            <div style={{height:16}}/>
          </div>
        </>}

        <BottomNav items={userNav} active={activeNav} onNav={n=>{setActiveNav(n);setSubPanel(null);}} unreadCount={unreadAdmin}/>
      </div>
    );
  }

  return <Spinner/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
document.addEventListener("fbReady", ()=>{ hideSplash(); }, {once:true});
setTimeout(hideSplash, 8000);
  </script>
</body>
</html>
