// Countdown helper
const getCountdown = (expiresDate) => {
  const diff = new Date(expiresDate+" 23:59:59") - new Date();
  if (diff <= 0) return "Berakhir";
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  if (d > 0) return `${d}h ${h}j lagi`;
  if (h > 0) return `${h}j ${m}m lagi`;
  return `${m}m lagi`;
};

// Export CSV
const exportCSV = (rows, filename) => {
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
};

          <InfoRow label={`Bonus card ${myCard?myCard.name:"(no card)"}`} value={myCard?`+${Math.round(REFERRAL_LBP_BONUS*myCard.referralPct/100)} LBP`:"—"} color={myCard?.color||"#555"}/>
          <InfoRow label="Total per referral" value={`+${bonusPerRef} LBP = ${fmt(bonusPerRef*LBP_TO_IDR)}`} color="#ffd700"/>
          <InfoRow label="Total LBP dari referral" value={totalEarned} color="#4ade80" border={false}/>
        </Card>

        {/* Referrals list */}
        <SecTitle>👥 Teman yang Diajak ({referrals.length})</SecTitle>
        {referrals.length===0
          ?<Card><div style={{textAlign:"center",padding:"20px 0",color:"#444",fontSize:13}}>Belum ada teman yang join pakai kode kamu 🥲<br/><span style={{fontSize:11,marginTop:6,display:"block"}}>Share kode kamu sekarang!</span></div></Card>
          :referrals.map(r=>{
            const rk=getRank(r.lbp);
            return (
              <Card key={r.id} style={{marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:40,height:40,borderRadius:"50%",background:`linear-gradient(135deg,${rk.color},#07070f)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,border:`2px solid ${rk.color}40`}}>{r.username[0]}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{r.username}</div>
                  <Badge c={rk.color} sm>{rk.label}</Badge>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:12,color:"#4ade80",fontWeight:700}}>{r.sales} sales</div>
                  <div style={{fontSize:10,color:"#555"}}>sejak {r.joinDate}</div>
                </div>
              </Card>
            );
          })
        }
      </div>
    </div>
  );
};

const pageStyle = {minHeight:"100vh",background:"#07070f",fontFamily:ff,color:"#e0e0e0",paddingBottom:76,maxWidth:480,margin:"0 auto",position:"relative"};

// ══════════════════════════════════════════════════════════════════════════════
//  APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [users,      setUsers]      = useState(DB.users);
  const [settings,   setSettings]   = useState(DB.settings);
  const [screen,     setScreen]     = useState("login");
  const [currentUser,setCurrentUser]= useState(null);
  const [activeNav,  setActiveNav]  = useState("home");
  const [subPanel,   setSubPanel]   = useState(null);
  const [adminSub,   setAdminSub]   = useState(null);
  const [shopDetail, setShopDetail] = useState(null);
  const [toast,      setToast]      = useState(null);
  const [tick,       setTick]       = useState(0); // for countdown refresh

  // Auth fields
  const [lUser,setLUser]=useState(""); const [lPass,setLPass]=useState(""); const [lErr,setLErr]=useState("");
  const [rUser,setRUser]=useState(""); const [rPass,setRPass]=useState(""); const [rPass2,setRPass2]=useState(""); const [rErr,setRErr]=useState("");
  const [rRef, setRRef] =useState("");

  // Admin fields
  const [lbpEdit,  setLbpEdit]  = useState({});
  const [stockEdit,setStockEdit]= useState({});

  // User fields
  const [formSold,  setFormSold]  = useState("");
  const [formStock, setFormStock] = useState("");
  const [formWd,    setFormWd]    = useState("");
  const [lbpConv,   setLbpConv]   = useState("");

  const showToast = (t,m,dur=3000)=>{ setToast({t,m}); setTimeout(()=>setToast(null),dur); };

  // Countdown ticker
  useEffect(()=>{
    const id=setInterval(()=>setTick(p=>p+1),60000);
    return ()=>clearInterval(id);
  },[]);

  const updateUser = (id,patch) => {
    const upd = users.map(u=>u.id===id?{...u,...patch}:u);
    setUsers(upd); DB.users=upd;
    if(currentUser?.id===id) setCurrentUser(p=>({...p,...patch}));
  };

  const login = () => {
    const f=users.find(u=>u.username===lUser&&u.password===lPass);
    if(!f){setLErr("Username atau password salah!"); return;}
    setCurrentUser(f); setScreen(f.role==="admin"?"adminDash":"userDash"); setActiveNav("home"); setSubPanel(null); setAdminSub(null);
  };

  const register = () => {
    if(!rUser||!rPass||!rPass2){setRErr("Semua field wajib diisi!"); return;}
    if(rPass!==rPass2){setRErr("Password tidak cocok!"); return;}
    if(users.find(u=>u.username.toLowerCase()===rUser.toLowerCase())){setRErr("Username sudah dipakai!"); return;}
    
    let referrerId = null;
    if(rRef.trim()) {
      const referrer = users.find(u=>u.referralCode===rRef.trim().toUpperCase());
      if(!referrer){setRErr("Kode referral tidak valid!"); return;}
      referrerId = referrer.id;
    }
    
    const code = generateCode(rUser);
    const nu={
      id:Date.now().toString(), username:rUser, password:rPass, role:"user",
      lbp:settings.newUserBonus, sales:0, stock:100, wallet:0, soldToday:0,
      joinDate:new Date().toISOString().split("T")[0], memberCard:null, ownedCards:[],
      setoran:0, withdrawn:0, stockRequests:[],
      lbpHistory:[{type:"earn",amount:settings.newUserBonus,desc:"Bonus signup",date:new Date().toLocaleDateString("id-ID")}],
      salesHistory:[], referralCode:code, referredBy:referrerId, referrals:[], monthlySales:0
    };
    
    let updatedUsers = [...users, nu];
    // If referred, add referral to referrer's list (bonus granted on first sale)
    if(referrerId) {
      updatedUsers = updatedUsers.map(u=>u.id===referrerId?{...u,referrals:[...(u.referrals||[]),nu.id]}:u);
    }
    
    setUsers(updatedUsers); DB.users=updatedUsers;
    showToast("s",`Akun berhasil! Bonus ${settings.newUserBonus} LBP 🎉${referrerId?" + Kode referral valid!":""}`);
    setTimeout(()=>{setScreen("login");setRUser("");setRPass("");setRPass2("");setRRef("");setRErr("");},1800);
  };

  const logout = ()=>{ setCurrentUser(null); setScreen("login"); setLUser(""); setLPass(""); setLErr(""); setSubPanel(null); setAdminSub(null); };

  // ── Sell logic ───────────────────────────────────────────────────────────────
  const submitSales = () => {
    const sold  = parseInt(formSold)||0;
    const stock = parseInt(formStock)||0;
    if(sold<0||stock<0){showToast("e","Nilai tidak boleh negatif!"); return;}
    if(sold>0&&sold>currentUser.stock){showToast("e","Unit melebihi stok tersedia!"); return;}
    
    const myCard   = MEMBER_CARDS.find(c=>c.id===currentUser.memberCard);
    const lbpGain  = (LBP_BASE_PER_SALE + (myCard?.lbpBonus||0)) * sold;
    const profit   = PROFIT_PER_PRODUK * sold;
    const setorAuto= SETORAN_PER_PRODUK * sold;
    const reqs     = stock>0?[...(currentUser.stockRequests||[]),{qty:stock,date:new Date().toLocaleDateString("id-ID"),status:"Menunggu"}]:(currentUser.stockRequests||[]);
    const today    = new Date().toLocaleDateString("id-ID");
    
    // Add to LBP history
    const newLbpHistory = sold>0 ? [...(currentUser.lbpHistory||[]),{type:"earn",amount:lbpGain,desc:`${sold} produk terjual`,date:today}] : (currentUser.lbpHistory||[]);
    // Add to sales history
    const newSalesHistory = sold>0 ? [...(currentUser.salesHistory||[]),{qty:sold,profit,lbp:lbpGain,date:today}] : (currentUser.salesHistory||[]);
    
    updateUser(currentUser.id,{
      stock:         currentUser.stock - sold,
      sales:         currentUser.sales + sold,
      soldToday:     currentUser.soldToday + sold,
      monthlySales:  (currentUser.monthlySales||0) + sold,
      wallet:        (currentUser.wallet||0) + profit,
      lbp:           currentUser.lbp + lbpGain,
      setoran:       (currentUser.setoran||0) + setorAuto,
      stockRequests: reqs,
      lbpHistory:    newLbpHistory,
      salesHistory:  newSalesHistory,
    });

    // Referral bonus: if this is user's first ever sale, reward referrer
    if(currentUser.sales===0 && sold>0 && currentUser.referredBy) {
      const referrer = users.find(u=>u.id===currentUser.referredBy);
      if(referrer) {
        const refCard = MEMBER_CARDS.find(c=>c.id===referrer.memberCard);
        const refBonus = REFERRAL_LBP_BONUS + Math.round(REFERRAL_LBP_BONUS*(refCard?.referralPct||0)/100);
        const refHistory = [...(referrer.lbpHistory||[]),{type:"referral",amount:refBonus,desc:`Referral: ${currentUser.username} jual pertama`,date:today}];
        updateUser(referrer.id,{lbp:referrer.lbp+refBonus,lbpHistory:refHistory});
      }
    }

    showToast("s",`${sold>0?`${sold} unit terjual! +${lbpGain} LBP, +${fmt(profit)} wallet. `:""}${stock>0?`Permintaan ${stock} stok dikirim.`:""}`);
    setFormSold(""); setFormStock(""); setSubPanel(null);
  };

  const submitWithdraw = () => {
    const amt = parseInt(formWd)||0;
    const w   = currentUser.wallet||0;
    if(amt<=0){showToast("e","Masukkan jumlah yang valid!"); return;}
    if(amt>w){showToast("e",`Saldo tidak cukup! Maks ${fmt(w)}`); return;}
    updateUser(currentUser.id,{wallet:w-amt,withdrawn:(currentUser.withdrawn||0)+amt});
    showToast("s",`Withdraw ${fmt(amt)} berhasil diajukan!`);
    setFormWd(""); setSubPanel(null);
  };

  const submitLbpConvert = () => {
    const lbp = parseInt(lbpConv)||0;
    if(lbp<=0){showToast("e","Masukkan jumlah LBP yang valid!"); return;}
    if(lbp>currentUser.lbp){showToast("e","LBP tidak cukup!"); return;}
    const idr = lbp * LBP_TO_IDR;
    const today = new Date().toLocaleDateString("id-ID");
    const newLbpHistory = [...(currentUser.lbpHistory||[]),{type:"convert",amount:lbp,desc:`Konversi ke Rupiah → ${fmt(idr)}`,date:today}];
    updateUser(currentUser.id,{lbp:currentUser.lbp-lbp,wallet:(currentUser.wallet||0)+idr,lbpHistory:newLbpHistory});
    showToast("s",`${lbp} LBP → ${fmt(idr)} masuk wallet!`);
    setLbpConv("");
  };

  const buyCard = (card) => {
    if(currentUser.ownedCards?.includes(card.id)){showToast("e","Kartu ini sudah kamu miliki!"); return;}
    if(currentUser.lbp<card.price){showToast("e",`LBP tidak cukup! Butuh ${card.price} LBP.`); return;}
    const today = new Date().toLocaleDateString("id-ID");
    const newLbpHistory = [...(currentUser.lbpHistory||[]),{type:"spend",amount:card.price,desc:`Beli ${card.name}`,date:today}];
    updateUser(currentUser.id,{lbp:currentUser.lbp-card.price,ownedCards:[...(currentUser.ownedCards||[]),card.id],memberCard:card.id,lbpHistory:newLbpHistory});
    showToast("s",`${card.icon} ${card.name} berhasil dibeli!`);
    setShopDetail(null);
  };

  const nonAdmin = users.filter(u=>u.role!=="admin");
  const sorted   = [...nonAdmin].sort((a,b)=>b.lbp-a.lbp);
  const totalSetoran = nonAdmin.reduce((s,u)=>s+(u.setoran||0),0);
  const totalSales   = nonAdmin.reduce((s,u)=>s+u.sales,0);

  // ════════════════════════════════════════════════════════════════════════════
  //  AUTH
  // ════════════════════════════════════════════════════════════════════════════
  if(screen==="login") return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 30% 0%,#1a0533 0%,#07070f 60%)",fontFamily:ff,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 24px"}}>
      <Toast msg={toast}/>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{fontSize:44,marginBottom:10}}>◈</div>
        <div style={{fontSize:11,letterSpacing:6,color:"#9333ea",textTransform:"uppercase",marginBottom:6}}>Sales Network</div>
        <div style={{fontSize:32,fontWeight:800,background:"linear-gradient(135deg,#e8e8e8,#9333ea)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>NORTHGATE</div>
      </div>
      {lErr&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:12,padding:"12px 16px",fontSize:13,color:"#ff7070",marginBottom:16,textAlign:"center"}}>⚠ {lErr}</div>}
      <Inp label="Username" value={lUser} onChange={e=>setLUser(e.target.value)} placeholder="Masukkan username" autoCapitalize="none"/>
      <Inp label="Password" type="password" value={lPass} onChange={e=>setLPass(e.target.value)} placeholder="Masukkan password" onKeyDown={e=>e.key==="Enter"&&login()}/>
      <div style={{marginBottom:14}}/>
      <Btn onClick={login}>Masuk →</Btn>
      <div style={{display:"flex",alignItems:"center",gap:10,margin:"20px 0",color:"#333",fontSize:12}}><div style={{flex:1,height:1,background:"#1e1e2e"}}/>atau<div style={{flex:1,height:1,background:"#1e1e2e"}}/></div>
      <Btn onClick={()=>{setScreen("register");setLErr("");}} variant="ghost">Buat Akun Baru</Btn>
      <div style={{textAlign:"center",marginTop:28,fontSize:10,color:"#222",letterSpacing:2}}>LUSTBURNPOINT SYSTEM v3.0</div>
    </div>
  );

  if(screen==="register") return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 30% 0%,#1a0533 0%,#07070f 60%)",fontFamily:ff,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 24px"}}>
      <Toast msg={toast}/>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{fontSize:44,marginBottom:10}}>✦</div>
        <div style={{fontSize:11,letterSpacing:6,color:"#9333ea",textTransform:"uppercase",marginBottom:6}}>Sales Network</div>
        <div style={{fontSize:32,fontWeight:800,background:"linear-gradient(135deg,#e8e8e8,#9333ea)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DAFTAR</div>
        <div style={{fontSize:13,color:"#666",marginTop:6,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>Dapat <LBPDisplay amount={settings.newUserBonus} size={15} fontSize={13}/> = {fmt(settings.newUserBonus*LBP_TO_IDR)} bonus!</div>
      </div>
      {rErr&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:12,padding:"12px 16px",fontSize:13,color:"#ff7070",marginBottom:16,textAlign:"center"}}>⚠ {rErr}</div>}
      <Inp label="Username" value={rUser} onChange={e=>setRUser(e.target.value)} placeholder="Pilih username" autoCapitalize="none"/>
      <Inp label="Password" type="password" value={rPass} onChange={e=>setRPass(e.target.value)} placeholder="Buat password"/>
      <Inp label="Konfirmasi Password" type="password" value={rPass2} onChange={e=>setRPass2(e.target.value)} placeholder="Ulangi password"/>
      <Inp label="Kode Referral (opsional)" value={rRef} onChange={e=>setRRef(e.target.value.toUpperCase())} placeholder="Contoh: GOPAL87" style={{textTransform:"uppercase",letterSpacing:2}}/>
      <div style={{marginBottom:14}}/>
      <Btn onClick={register} onKeyDown={e=>e.key==="Enter"&&register()}>Buat Akun →</Btn>
      <div style={{height:12}}/>
      <Btn onClick={()=>{setScreen("login");setRErr("");}} variant="ghost">← Kembali ke Login</Btn>
    </div>
  );

  // ════════════════════════════════════════════════════════════════════════════
  //  ADMIN DASHBOARD
  // ════════════════════════════════════════════════════════════════════════════
  if(screen==="adminDash") {
    const adminNav = [
      {id:"home",    icon:"📊", label:"Overview"},
      {id:"users",   icon:"👥", label:"Users"},
      {id:"finance", icon:"💰", label:"Keuangan"},
      {id:"setting", icon:"⚙️", label:"Setting"},
    ];

    // ── Admin sub-panel ─────────────────────────────────────────────────────
    if(adminSub) {
      const {panel,userId} = adminSub;
      const u = users.find(x=>x.id===userId);
      if(!u) { setAdminSub(null); return null; }
      const r = getRank(u.lbp);
      const card = MEMBER_CARDS.find(c=>c.id===u.memberCard);

      if(panel==="sales") return (
        <div style={pageStyle}>
          <Toast msg={toast}/>
          <BackHeader title={`Penjualan — ${u.username}`} sub="Admin · Detail User" accent="#4ade80" onBack={()=>setAdminSub(null)}/>
          <div style={{padding:"20px 16px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <Card><div style={{fontSize:10,color:"#4ade80",fontWeight:700,letterSpacing:1,marginBottom:6}}>TOTAL TERJUAL</div><div style={{fontSize:28,fontWeight:800,color:"#4ade80"}}>{u.sales}</div><div style={{fontSize:11,color:"#555"}}>unit (all time)</div></Card>
              <Card><div style={{fontSize:10,color:"#60efff",fontWeight:700,letterSpacing:1,marginBottom:6}}>TERJUAL HARI INI</div><div style={{fontSize:28,fontWeight:800,color:"#60efff"}}>{u.soldToday}</div><div style={{fontSize:11,color:"#555"}}>unit hari ini</div></Card>
              <Card><div style={{fontSize:10,color:"#f97316",fontWeight:700,letterSpacing:1,marginBottom:6}}>STOK SAAT INI</div><div style={{fontSize:28,fontWeight:800,color:"#f97316"}}>{u.stock}</div><div style={{fontSize:11,color:"#555"}}>unit tersisa</div></Card>
              <Card><div style={{fontSize:10,color:"#fbbf24",fontWeight:700,letterSpacing:1,marginBottom:6}}>TOTAL OMZET</div><div style={{fontSize:20,fontWeight:800,color:"#fbbf24"}}>{fmtK(u.sales*HARGA_JUAL)}</div><div style={{fontSize:11,color:"#555"}}>{fmt(u.sales*HARGA_JUAL)}</div></Card>
            </div>
            <SecTitle>Rincian Finansial</SecTitle>
            <Card style={{marginBottom:16}}>
              <InfoRow label="Total Omzet" value={fmt(u.sales*HARGA_JUAL)} color="#e0e0e0"/>
              <InfoRow label="Total Setoran ke Admin" value={fmt(u.setoran||0)} color="#ef4444"/>
              <InfoRow label="Total Profit User" value={fmt(u.sales*PROFIT_PER_PRODUK)} color="#4ade80"/>
              <InfoRow label="Sudah Withdraw" value={fmt(u.withdrawn||0)} color="#c084fc"/>
              <InfoRow label="Saldo Wallet" value={fmt(u.wallet||0)} color="#c084fc" border={false}/>
            </Card>
            {/* Monthly target for this user */}
            {card&&<><SecTitle>🎯 Progress Target Bulan Ini</SecTitle>
              <Card style={{marginBottom:16,border:`1px solid ${card.color}30`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:13,color:"#888"}}>{card.name} · Target {card.target}/bulan</span>
                  <span style={{fontSize:13,fontWeight:700,color:card.color}}>{u.monthlySales||0}/{card.target}</span>

                <ProgressBar pct={Math.round(((u.monthlySales||0)/card.target)*100)} color={card.color}/>
              </Card>
            </>}
            <SecTitle>Riwayat Sales</SecTitle>
            {(u.salesHistory||[]).length===0
              ?<Card><div style={{textAlign:"center",color:"#444",fontSize:13,padding:"10px 0"}}>Belum ada riwayat</div></Card>

                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <div><div style={{fontSize:13,fontWeight:600}}>{s.qty} unit terjual</div><div style={{fontSize:11,color:"#555"}}>{s.date}</div></div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:12,color:"#4ade80",fontWeight:700}}>+{fmt(s.profit)}</div>
                    <LBPDisplay amount={"+"+s.lbp} size={12} fontSize={11} color="#ffd700"/>

              ))}</Card>}
            <div style={{height:12}}/>
            <SecTitle>Permintaan Stok</SecTitle>
            {(u.stockRequests||[]).length===0

              :<>
                {(u.stockRequests||[]).filter(r=>r.status==="Menunggu").length>1&&(
                  <Btn variant="success" small style={{marginBottom:10}} onClick={()=>{

                    showToast("s",`Semua stok disetujui! +${totalQty} unit`);
                  }}>✓ Approve Semua yang Menunggu</Btn>
                )}
                <Card>{(u.stockRequests||[]).slice().reverse().map((r2,i)=>(

                      {r2.status==="Menunggu"&&<button onClick={()=>{
                        const idx=u.stockRequests.length-1-i;
                        const newReqs=[...(u.stockRequests||[])]; newReqs[idx]={...newReqs[idx],status:"Selesai"};
                        updateUser(u.id,{stock:(u.stock||0)+r2.qty,stockRequests:newReqs});
                        showToast("s",`Stok +${r2.qty} unit untuk ${u.username} disetujui!`);
                      }} style={{background:"rgba(74,222,128,0.12)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:8,padding:"5px 12px",color:"#4ade80",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:ff}}>✓ Setujui</button>}
                    </div>
                  </div>
                ))}</Card>
              </>
            }
            <div style={{height:16}}/>
          </div>

      if(panel==="wallet") return (

                  <div style={{fontSize:14,fontWeight:800,color:ev.color,marginBottom:4}}>{ev.title}</div>
                  <div style={{fontSize:12,color:"#777",lineHeight:1.5,marginBottom:6}}>{ev.desc}</div>
                  <div style={{fontSize:11,color:"#ef4444",fontWeight:700}}>⏱ {getCountdown(ev.expiresDate)}</div>
                </div>
                <div style={{background:`${ev.color}20`,border:`1px solid ${ev.color}40`,borderRadius:10,padding:"6px 10px",fontSize:12,fontWeight:800,color:ev.color,whiteSpace:"nowrap",flexShrink:0}}>{ev.reward}</div>
              </div>
            </Card>
          ))}
          <div style={{height:16}}/>
        </div>
      </div>
    );

    // ── Main user pages ─────────────────────────────────────────────────────
    return (
      <div style={pageStyle}>
        <Toast msg={toast}/>

        {/* HOME */}
        {activeNav==="home"&&<>
          <div style={{background:"linear-gradient(160deg,#1a0533,#07070f)",padding:"48px 20px 24px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div>
                <div style={{fontSize:12,color:"#9333ea",fontWeight:700,letterSpacing:1}}>◈ NORTHGATE SALES</div>
                <div style={{fontSize:22,fontWeight:800,color:"#e0e0e0",marginTop:2}}>Halo, {currentUser.username}! 👋</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                <div style={{width:46,height:46,borderRadius:"50%",background:`linear-gradient(135deg,${rank.color},#1a0533)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,border:`2px solid ${rank.color}55`}}>{currentUser.username[0]}</div>
                <button onClick={logout} style={{background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,padding:"5px 10px",color:"#ef4444",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:ff}}>Logout</button>
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${rank.color}30`,borderRadius:18,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:11,color:"#666",fontWeight:700,letterSpacing:1,display:"flex",alignItems:"center",gap:5,marginBottom:4}}><LBPCoin size={14}/>LBP SAAT INI</div>
                <LBPDisplay amount={currentUser.lbp} size={28} fontSize={34}/>
                <div style={{fontSize:11,color:"#555",marginTop:2}}>Peringkat #{myPos} dari {sorted.length}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:32}}>{rank.label.split(" ")[0]}</div>
                <Badge c={rank.color}>{rank.label}</Badge>
              </div>
            </div>
          </div>
          <div style={{padding:"0 16px"}}>
            <div style={{height:16}}/>

            {/* Monthly target on home */}
            {myCard&&<MonthlyTarget user={currentUser} myCard={myCard}/>}

            {/* 4 CLICKABLE PANELS */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
              <Card onClick={()=>setSubPanel("sales")} style={{border:"1px solid rgba(74,222,128,0.25)",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:10,right:12,fontSize:18,opacity:0.25}}>📈</div>
                <div style={{fontSize:10,color:"#4ade80",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Penjualan</div>
                <div style={{fontSize:26,fontWeight:800,color:"#4ade80",lineHeight:1}}>{currentUser.soldToday}</div>
                <div style={{fontSize:11,color:"#555",marginTop:4}}>unit hari ini</div>
                <div style={{marginTop:10,fontSize:11,color:"#4ade80",fontWeight:600}}>Detail & Lapor ›</div>
              </Card>
              <Card onClick={()=>setSubPanel("wallet")} style={{border:"1px solid rgba(192,132,252,0.25)",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:10,right:12,fontSize:18,opacity:0.25}}>💰</div>
                <div style={{fontSize:10,color:"#c084fc",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Wallet</div>
                <div style={{fontSize:20,fontWeight:800,color:"#c084fc",lineHeight:1}}>{fmtK(walletTotal)}</div>
                <div style={{fontSize:11,color:"#555",marginTop:4}}>saldo tersedia</div>
                <div style={{marginTop:10,fontSize:11,color:"#c084fc",fontWeight:600}}>Detail & Withdraw ›</div>
              </Card>
              <Card onClick={()=>setSubPanel("lbp")} style={{border:"1px solid rgba(255,215,0,0.25)",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:10,right:12,opacity:0.2}}><LBPCoin size={22}/></div>
                <div style={{fontSize:10,color:"#ffd700",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6,display:"flex",alignItems:"center",gap:4}}><LBPCoin size={12}/>LBP</div>
                <LBPDisplay amount={currentUser.lbp} size={22} fontSize={26}/>
                <div style={{fontSize:11,color:"#555",marginTop:4}}>LustBurnPoints</div>
                <div style={{marginTop:10,fontSize:11,color:"#ffd700",fontWeight:600}}>Detail & Konversi ›</div>
              </Card>
              <Card style={{border:"1px solid rgba(96,239,255,0.25)",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:10,right:12,fontSize:18,opacity:0.25}}>📦</div>
                <div style={{fontSize:10,color:"#60efff",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Stok</div>
                <div style={{fontSize:26,fontWeight:800,color:"#60efff",lineHeight:1}}>{currentUser.stock}</div>
                <div style={{fontSize:11,color:"#555",marginTop:4}}>unit dibawa</div>
                <div style={{marginTop:10,fontSize:11,color:"#444",fontWeight:600}}>Total Sales: {currentUser.sales}</div>
              </Card>
            </div>
            <div style={{fontSize:11,color:"#3a3a4a",textAlign:"center",marginBottom:16}}>💡 Tap Penjualan, Wallet, atau LBP untuk detail</div>

            {/* Member card */}
            <SecTitle>Member Card</SecTitle>
            {myCard
              ?<Card style={{marginBottom:16,border:`1px solid ${myCard.color}30`,background:`linear-gradient(135deg,${myCard.color}08,transparent)`}} onClick={()=>setActiveNav("shop")}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <div style={{fontSize:36}}>{myCard.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:16,fontWeight:800,color:myCard.color}}>{myCard.name}</div>
                    <div style={{fontSize:12,color:"#666",marginTop:4,display:"flex",alignItems:"center",gap:3}}>+{myCard.lbpBonus} <LBPCoin size={12}/>/produk · Total {LBP_BASE_PER_SALE+myCard.lbpBonus} <LBPCoin size={12}/>/produk</div>
                  </div>
                  <span style={{color:"#555",fontSize:18}}>›</span>
                </div>
              </Card>
              :<Card style={{marginBottom:16,textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:8}}>🃏</div>
                <div style={{fontSize:13,color:"#666",marginBottom:12}}>Belum punya member card</div>
                <Btn onClick={()=>setActiveNav("shop")} small variant="ghost">Lihat Shop →</Btn>
              </Card>
            }

            {/* Referral quick card */}
            <Card style={{marginBottom:16,background:"linear-gradient(135deg,rgba(34,197,94,0.06),transparent)",border:"1px solid rgba(34,197,94,0.2)"}} onClick={()=>setSubPanel("referral")}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:28}}>👥</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#4ade80"}}>Referral</div>
                  <div style={{fontSize:12,color:"#666",marginTop:2}}>Ajak teman, dapat <span style={{color:"#4ade80",fontWeight:700}}>+{REFERRAL_LBP_BONUS}+ LBP</span> per teman</div>
                  <div style={{marginTop:4,fontSize:11,color:"#666"}}>Kode kamu: <span style={{color:"#4ade80",fontWeight:700,letterSpacing:1}}>{currentUser.referralCode}</span> · {(currentUser.referrals||[]).length} teman</div>
                </div>
                <span style={{color:"#555",fontSize:18}}>›</span>
              </div>
            </Card>

            {/* Event preview with countdown */}
            <SecTitle>🎉 Event Aktif</SecTitle>
            {ACTIVE_EVENTS.slice(0,2).map(ev=>(
              <Card key={ev.id} style={{marginBottom:10,border:`1px solid ${ev.color}30`,background:`linear-gradient(135deg,${ev.color}06,transparent)`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,color:ev.color}}>{ev.title}</div>
                    <div style={{fontSize:11,color:"#666",marginTop:3}}>{ev.desc}</div>
                    <div style={{fontSize:10,color:"#ef4444",fontWeight:600,marginTop:4}}>⏱ {getCountdown(ev.expiresDate)}</div>
                  </div>
                  <div style={{background:`${ev.color}20`,border:`1px solid ${ev.color}40`,borderRadius:10,padding:"6px 10px",fontSize:11,fontWeight:800,color:ev.color,whiteSpace:"nowrap",flexShrink:0}}>{ev.reward}</div>
                </div>
              </Card>
            ))}
            <button onClick={()=>setSubPanel("lbp")} style={{width:"100%",padding:"10px",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.02)",color:"#555",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:ff,marginBottom:16}}>Lihat semua event & konversi LBP →</button>
          </div>
        </>}

        {/* SHOP */}
        {activeNav==="shop"&&<>
          <div style={{background:"linear-gradient(160deg,#1a0533,#07070f)",padding:"48px 20px 20px",marginBottom:4}}>
            <div style={{fontSize:11,color:"#9333ea",fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>◈ Toko</div>
            <div style={{fontSize:24,fontWeight:800,color:"#e0e0e0",marginTop:2}}>Member Card Shop</div>
            <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:13,color:"#666"}}>Saldo:</span>
              <LBPDisplay amount={currentUser.lbp} size={20} fontSize={18}/>
              <span style={{fontSize:12,color:"#555"}}>≈ {fmt(currentUser.lbp*LBP_TO_IDR)}</span>
            </div>
          </div>
          <div style={{padding:"0 16px"}}>
            <div style={{height:16}}/>
            <div style={{background:"rgba(255,215,0,0.06)",border:"1px solid rgba(255,215,0,0.2)",borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:12,color:"#bbb"}}>
              Semua member card memberikan <span style={{color:"#ffd700",fontWeight:700}}>bonus LBP tambahan</span> + <span style={{color:"#4ade80",fontWeight:700}}>bonus referral</span> per produk terjual.
            </div>
            {MEMBER_CARDS.map(card=>{
              const owned=currentUser.ownedCards?.includes(card.id);
              const active=currentUser.memberCard===card.id;
              const canBuy=currentUser.lbp>=card.price;
              return (
                <div key={card.id} onClick={()=>setShopDetail(card)} style={{background:active?`linear-gradient(135deg,${card.color}10,#07070f)`:"rgba(255,255,255,0.03)",border:`1px solid ${active?card.color+"50":card.color+"20"}`,borderRadius:18,padding:"16px 18px",marginBottom:12,display:"flex",alignItems:"center",gap:16,cursor:"pointer",boxShadow:active?`0 0 24px ${card.color}15`:"none"}}>
                  <div style={{fontSize:36,flexShrink:0}}>{card.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:16,color:card.color}}>{card.name}</div>
                    <div style={{fontSize:12,color:"#666",marginTop:3,display:"flex",alignItems:"center",gap:3}}>+{card.lbpBonus} <LBPCoin size={12}/>/produk · Total {LBP_BASE_PER_SALE+card.lbpBonus} <LBPCoin size={12}/></div>
                    <div style={{marginTop:6}}>
                      {active?<Badge c={card.color} sm>AKTIF</Badge>:owned?<Badge c="#666" sm>DIMILIKI</Badge>:canBuy?<Badge c={card.color} sm>{card.price} LBP</Badge>:<Badge c="#444" sm>Butuh {card.price} LBP</Badge>}
                    </div>
                  </div>
                  <div style={{fontSize:18,color:"#444"}}>›</div>
                </div>
              );
            })}
            <div style={{height:12}}/>
          </div>
        </>}

        {/* RANKING */}
        {activeNav==="ranking"&&<>
          <div style={{background:"linear-gradient(160deg,#1a0533,#07070f)",padding:"48px 20px 20px",marginBottom:4}}>
            <div style={{fontSize:11,color:"#9333ea",fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>◈ Papan Skor</div>
            <div style={{fontSize:24,fontWeight:800,color:"#e0e0e0",marginTop:2}}>Leaderboard</div>
          </div>
          <div style={{padding:"0 16px"}}>
            <div style={{height:16}}/>
            {sorted.map((u,i)=>{
              const r=getRank(u.lbp); const medals=["🥇","🥈","🥉"]; const isMe=u.id===currentUser.id;
              const uCard=MEMBER_CARDS.find(c=>c.id===u.memberCard);
              return (
                <Card key={u.id} style={{marginBottom:10,display:"flex",alignItems:"center",gap:14,border:isMe?`1px solid ${r.color}45`:"1px solid rgba(255,255,255,0.07)",background:isMe?`linear-gradient(135deg,${r.color}10,#07070f)`:"rgba(255,255,255,0.03)",boxShadow:isMe?`0 0 20px ${r.color}12`:"none"}}>
                  <div style={{fontSize:24,minWidth:34,textAlign:"center"}}>{medals[i]||<span style={{fontSize:14,color:"#555",fontWeight:700}}>#{i+1}</span>}</div>
                  <div style={{width:42,height:42,borderRadius:"50%",background:`linear-gradient(135deg,${r.color},#07070f)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:800,border:`2px solid ${r.color}40`,flexShrink:0}}>{u.username[0]}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:15,color:isMe?r.color:"#e0e0e0"}}>{u.username}{isMe&&<span style={{fontSize:11,color:"#555"}}> (kamu)</span>}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3,flexWrap:"wrap"}}>
                      <Badge c={r.color} sm>{r.label}</Badge>
                      {uCard&&<Badge c={uCard.color} sm>{uCard.icon} {uCard.name}</Badge>}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <LBPDisplay amount={u.lbp} size={18} fontSize={20}/>
                    <div style={{fontSize:10,color:"#555",marginTop:2}}>{u.sales} sales</div>
                  </div>
                </Card>
              );
            })}
          </div>
        </>}

        <BottomNav items={userNav} active={activeNav} onNav={n=>{setActiveNav(n);setSubPanel(null);}}/>
      </div>
    );
  }

  return null;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    hideSplash();
  </script>
</body>
</html>
